fr-CA:
  locator:
    info:
      start:
        page_title: "Faites inscrire votre groupe - CR Locator"
        subtitle: "CR Locator"
        title: "Comment faire inscrire votre groupe CR sur le Locator"
        intro: "Merci de votre intérêt à ajouter votre Ministère Celebrate Recovery au CR Locator ! Veuillez cocher les cases ci-dessous indiquant que vous répondez aux exigences pour ajouter votre groupe."
        ministries: "Les Ministères Celebrate Recovery ajoutés au Locator peuvent être composés soit d'une Soirée de Réunion Générale (Large Group et groupes Open Share), soit uniquement de groupes Open Share, avec ou sans Fellowship Dinner et/ou Fellowship Cafe."
        question_1: "Notre Soirée de Réunion Générale ou nos groupes Open Share sont ouverts au public depuis un minimum de 90 jours."
        question_1_details: "Veuillez ne pas cocher cette case si vous n'êtes pas déjà ouvert au public depuis au moins 90 jours. Les 90 jours de fonctionnement n'incluent pas les Step Studies de pré-lancement et la formation des responsables pour préparer l'ouverture de votre CR au public. Les Représentants CR ne peuvent pas approuver les groupes tant qu'ils n'ont pas satisfait à cette exigence."
        question_2: "Notre Église et la Direction CR acceptent, mettent en œuvre et suivent l'ADN de Celebrate Recovery."
        question_2_details_html: "Le Responsable du Ministère CR et le membre du personnel de l'église auquel le Responsable du Ministère rend compte devront signer un formulaire d'accord afin que le CR soit approuvé pour être ajouté au Locator. L'ADN est disponible sur <a href=\"https://celebraterecovery.com\" target=\"_blank\" class=\"underline hover:text-gray-700\">celebraterecovery.com</a> &rsaquo; Resources &rsaquo; Our DNA."
        question_3: "Nos Responsables ont suivi une formation en ligne sur la façon de démarrer un Celebrate Recovery et/ou un Open Share Group CR uniquement."
        question_3_details_html: "Cela n'est pas obligatoire, mais constitue une information utile pour le Représentant CR qui approuvera votre demande d'inscription au Locator. Les vidéos de formation sont disponibles sur CR Official sur Mighty Networks. Rendez-vous sur <a href=\"https://celebraterecovery.com/cr-community/\" target=\"_blank\" class=\"underline hover:text-gray-700\">celebraterecovery.com/cr-community/</a> pour plus d'informations."
        requirements: "Si votre CR ne satisfait PAS aux deux premières exigences ci-dessus, ne continuez pas. Apportez d'abord les modifications nécessaires à votre Celebrate Recovery. Veuillez contacter un Représentant Celebrate Recovery si vous avez des questions."
        find_rep: "Retournez au CR Locator pour rechercher un Représentant ou un groupe CR."
        requirements_met: "Si votre CR satisfait aux exigences ci-dessus, cliquez sur le lien ci-dessous pour commencer le processus d'ajout de votre CR au Locator."
        buttons:
          dashboard: "Accédez à votre tableau de bord"
          setup: "Commençons"
