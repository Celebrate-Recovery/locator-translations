zh-TW:
  locator:
    info:
      start:
        page_title: "將您的小組加入名單 - CR Locator"
        subtitle: "CR Locator"
        title: "如何將您的 CR 小組加入 Locator"
        intro: "感謝您有興趣將您的 Celebrate Recovery 事工加入 CR Locator！請勾選下方的核取方塊，表明您符合新增小組的要求。"
        ministries: "加入 Locator 的 Celebrate Recovery 事工可以由一般聚會之夜（Large Group 和 Open Share 小組）或僅 Open Share 小組組成，可以有也可以沒有 Fellowship Dinner 和/或 Fellowship Cafe。"
        question_1: "我們的一般聚會之夜或 Open Share 小組已面向公眾運作至少 90 天。"
        question_1_details: "如果您尚未面向公眾運作至少 90 天，請不要勾選此方塊。90 天的運作時間不包括預啟動的 Step Studies 和領袖培訓，這些是為向公眾開放您的 CR 所做的準備。CR 代表在小組符合此要求之前無法批准。"
        question_2: "我們的教會和 CR 領導層同意、實施並遵循 Celebrate Recovery 的 DNA。"
        question_2_details_html: "CR 事工領袖以及事工領袖所報告的教會工作人員將需要簽署一份協議表格，以便 CR 獲得批准加入 Locator。DNA 可以在 <a href=\"https://celebraterecovery.com\" target=\"_blank\" class=\"underline hover:text-gray-700\">celebraterecovery.com</a> &rsaquo; Resources &rsaquo; Our DNA 上找到。"
        question_3: "我們的領袖已完成有關如何開始 Celebrate Recovery 和/或僅 Open Share Group CR 的線上培訓。"
        question_3_details_html: "這不是必需的，但對於將批准您加入 Locator 請求的 CR 代表來說是有用的資訊。培訓影片可以在 Mighty Networks 上的 CR Official 找到。造訪 <a href=\"https://celebraterecovery.com/cr-community/\" target=\"_blank\" class=\"underline hover:text-gray-700\">celebraterecovery.com/cr-community/</a> 取得更多資訊。"
        requirements: "如果您的 CR 不符合上述前兩項要求，請勿繼續。請先在您的 Celebrate Recovery 進行必要的變更。如果您有任何問題，請聯絡 Celebrate Recovery 代表。"
        find_rep: "返回 CR Locator 搜尋代表或 CR 小組。"
        requirements_met: "如果您的 CR 符合上述要求，請點擊下方連結開始將您的 CR 加入 Locator 的流程。"
        buttons:
          dashboard: "前往您的儀表板"
          setup: "讓我們開始吧"
