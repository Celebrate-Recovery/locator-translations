fil:
  locator:
    info:
      start:
        page_title: "Iparehistro ang iyong grupo - CR Locator"
        subtitle: "CR Locator"
        title: "Paano iparehistro ang iyong grupo sa CR sa Locator"
        intro: "Salamat sa iyong interes sa pagdaragdag ng iyong Celebrate Recovery Ministry sa CR Locator! Mangyaring lagyan ng tsek ang mga kahon sa ibaba na nagpapahiwatig na natutugunan mo ang mga kinakailangan para idagdag ang iyong grupo."
        ministries: "Ang mga Celebrate Recovery Ministry na idinaragdag sa Locator ay maaaring binubuo ng isang Pangkalahatang Gabi ng Pagtitipon (Large Group at mga grupo sa Open Share) o mga grupo lamang sa Open Share, na may o walang Fellowship Dinner at/o Fellowship Cafe."
        question_1: "Ang aming Pangkalahatang Gabi ng Pagtitipon o mga grupo sa Open Share ay naging bukas sa publiko nang hindi bababa sa 90 araw."
        question_1_details: "Mangyaring huwag lagyan ng tsek ang kahong ito kung hindi ka pa bukas sa publiko nang hindi bababa sa 90 araw. Ang 90 araw na pagpapatakbo ay hindi kasama ang mga Step Studies bago ang paglulunsad at pagsasanay ng mga lider upang maghanda ng iyong CR para sa publiko. Hindi maaaring aprubahan ng mga CR Rep ang mga grupo hanggang hindi nila natutugunan ang kinakailangang ito."
        question_2: "Ang aming Simbahan at CR Leadership ay sumasang-ayon, nagpapatupad at sumusunod sa DNA ng Celebrate Recovery."
        question_2_details_html: "Ang CR Ministry Leader at ang miyembro ng kawani ng simbahan na pinagbabalikan ng Ministry Leader ng ulat ay kakailanganin na pumirma ng isang kasunduan para maaprobahan ang CR na idagdag sa Locator. Ang DNA ay matatagpuan sa <a href=\"https://celebraterecovery.com\" target=\"_blank\" class=\"underline hover:text-gray-700\">celebraterecovery.com</a> &rsaquo; Resources &rsaquo; Our DNA."
        question_3: "Ang aming mga Lider ay nakumpleto na ang online na pagsasanay kung paano magsimula ng Celebrate Recovery at/o Open Share Group lamang na CR."
        question_3_details_html: "Hindi ito kinakailangan, ngunit ito ay kapaki-pakinabang na impormasyon para sa CR Rep na magpapatibay ng iyong kahilingan na idagdag sa Locator. Ang mga video ng pagsasanay ay matatagpuan sa CR Official sa Mighty Networks. Pumunta sa <a href=\"https://celebraterecovery.com/cr-community/\" target=\"_blank\" class=\"underline hover:text-gray-700\">celebraterecovery.com/cr-community/</a> para sa karagdagang impormasyon."
        requirements: "Kung ang iyong CR ay HINDI nakakatugon sa unang dalawang kinakailangan sa itaas, huwag magpatuloy. Gawin muna ang mga kinakailangang pagbabago sa iyong Celebrate Recovery. Mangyaring makipag-ugnayan sa isang Kinatawan ng Celebrate Recovery kung mayroon kang mga katanungan."
        find_rep: "Bumalik sa CR Locator upang maghanap ng isang Kinatawan o grupo ng CR."
        requirements_met: "Kung ang iyong CR ay NAKAKATUGON sa mga kinakailangan sa itaas, i-click ang link sa ibaba upang simulan ang proseso ng pagdaragdag ng iyong CR sa Locator."
        buttons:
          dashboard: "Pumunta sa iyong dashboard"
          setup: "Magsimula na tayo"
