el:
  locator:
    info:
      start:
        page_title: "Καταχωρίστε την ομάδα σας - CR Locator"
        subtitle: "CR Locator"
        title: "Πώς να καταχωρίσετε την ομάδα CR σας στον Locator"
        intro: "Σας ευχαριστούμε για το ενδιαφέρον σας να προσθέσετε το Celebrate Recovery Ministry σας στον CR Locator! Παρακαλούμε τσεκάρετε τα παρακάτω πλαίσια που υποδεικνύουν ότι πληροίτε τις προϋποθέσεις για να προσθέσετε την ομάδα σας."
        ministries: "Τα Celebrate Recovery Ministries που προστίθενται στον Locator μπορεί να αποτελούνται είτε από μια Γενική Βραδιά Συνάντησης (Large Group και ομάδες Open Share) είτε μόνο από ομάδες Open Share, με ή χωρίς Fellowship Dinner και/ή Fellowship Cafe."
        question_1: "Η Γενική Βραδιά Συνάντησης ή οι ομάδες Open Share μας λειτουργούν για το κοινό για τουλάχιστον 90 ημέρες."
        question_1_details: "Παρακαλούμε μην τσεκάρετε αυτό το πλαίσιο εάν δεν λειτουργείτε ήδη για το κοινό για τουλάχιστον 90 ημέρες. Οι 90 ημέρες λειτουργίας δεν περιλαμβάνουν τα Step Studies πριν την έναρξη και την εκπαίδευση ηγετών για την προετοιμασία του CR για το κοινό. Οι Εκπρόσωποι CR δεν μπορούν να εγκρίνουν ομάδες έως ότου πληρούν αυτή την απαίτηση."
        question_2: "Η Εκκλησία μας και η Ηγεσία CR συμφωνούν, εφαρμόζουν και ακολουθούν το DNA του Celebrate Recovery."
        question_2_details_html: "Ο Ηγέτης του CR Ministry και το μέλος του εκκλησιαστικού προσωπικού στον οποίο αναφέρεται ο Ηγέτης του Ministry θα πρέπει να υπογράψουν μια φόρμα συμφωνίας για να εγκριθεί το CR να προστεθεί στον Locator. Το DNA μπορεί να βρεθεί στο <a href=\"https://celebraterecovery.com\" target=\"_blank\" class=\"underline hover:text-gray-700\">celebraterecovery.com</a> &rsaquo; Resources &rsaquo; Our DNA."
        question_3: "Οι Ηγέτες μας έχουν ολοκληρώσει διαδικτυακή εκπαίδευση για το πώς να ξεκινήσουν ένα Celebrate Recovery και/ή Open Share Group Μόνο CR."
        question_3_details_html: "Αυτό δεν είναι υποχρεωτικό, αλλά είναι χρήσιμη πληροφορία για τον Εκπρόσωπο CR που θα εγκρίνει το αίτημά σας να προστεθείτε στον Locator. Τα εκπαιδευτικά βίντεο μπορούν να βρεθούν στο CR Official στο Mighty Networks. Μεταβείτε στο <a href=\"https://celebraterecovery.com/cr-community/\" target=\"_blank\" class=\"underline hover:text-gray-700\">celebraterecovery.com/cr-community/</a> για περισσότερες πληροφορίες."
        requirements: "Εάν το CR σας ΔΕΝ πληροί τις δύο πρώτες απαιτήσεις παραπάνω, μην προχωρήσετε. Κάντε πρώτα τις απαραίτητες αλλαγές στο Celebrate Recovery σας. Παρακαλούμε επικοινωνήστε με έναν Εκπρόσωπο Celebrate Recovery εάν έχετε ερωτήσεις."
        find_rep: "Επιστρέψτε στον CR Locator για να αναζητήσετε έναν Εκπρόσωπο ή ομάδα CR."
        requirements_met: "Εάν το CR σας ΠΛΗΡΟΙ τις απαιτήσεις παραπάνω, κάντε κλικ στον παρακάτω σύνδεσμο για να ξεκινήσετε τη διαδικασία προσθήκης του CR σας στον Locator."
        buttons:
          dashboard: "Μεταβείτε στο dashboard σας"
          setup: "Ας ξεκινήσουμε"
