hr:
  locator:
    info:
      start:
        page_title: "Dodajte svoju grupu na popis - CR Locator"
        subtitle: "CR Locator"
        title: "Kako dodati svoju CR grupu na Locator"
        intro: "Hvala vam na interesu za dodavanje vašeg Celebrate Recovery Ministarstva na CR Locator! Molimo označite okvire ispod koji označavaju da ispunjavate uvjete za dodavanje vaše grupe."
        ministries: "Celebrate Recovery Ministarstva koja se dodaju na Locator mogu se sastojati od Opće Večeri Sastanka (Large Group i Open Share Grupe) ili samo Open Share Grupa, sa ili bez Fellowship Dinner i/ili Fellowship Cafe."
        question_1: "Naša Opća Večer Sastanka ili Open Share Grupe su otvorene za javnost najmanje 90 dana."
        question_1_details: "Molimo ne označavajte ovaj okvir ako već niste otvoreni za javnost najmanje 90 dana. 90 dana rada ne uključuje predpokretačke Step Studies i obuku voditelja za pripremu otvaranja vašeg CR-a za javnost. CR Predstavnici ne mogu odobriti grupe dok ne ispune ovaj uvjet."
        question_2: "Naša Crkva i CR Vodstvo se slažu, provode i slijede DNK Celebrate Recovery."
        question_2_details_html: "Voditelj CR Ministarstva i crkveni zaposlenik kojemu Voditelj Ministarstva podnosi izvještaje morat će potpisati obrazac sporazuma kako bi CR bio odobren za dodavanje na Locator. DNK se može pronaći na <a href=\"https://celebraterecovery.com\" target=\"_blank\" class=\"underline hover:text-gray-700\">celebraterecovery.com</a> &rsaquo; Resources &rsaquo; Our DNA."
        question_3: "Naši Voditelji su završili online obuku o tome kako pokrenuti Celebrate Recovery i/ili Open Share Group Samo CR."
        question_3_details_html: "Ovo nije obavezno, ali je korisna informacija za CR Predstavnika koji će odobriti vaš zahtjev za dodavanje na Locator. Videozapisi obuke mogu se pronaći na CR Official na Mighty Networks. Idite na <a href=\"https://celebraterecovery.com/cr-community/\" target=\"_blank\" class=\"underline hover:text-gray-700\">celebraterecovery.com/cr-community/</a> za više informacija."
        requirements: "Ako vaš CR NE ispunjava prva dva uvjeta gore, nemojte nastaviti. Prvo napravite potrebne promjene u svom Celebrate Recovery. Molimo kontaktirajte Celebrate Recovery Predstavnika ako imate pitanja."
        find_rep: "Vratite se na CR Locator kako biste potražili Predstavnika ili CR grupu."
        requirements_met: "Ako vaš CR ISPUNJAVA gore navedene uvjete, kliknite na link ispod kako biste započeli proces dodavanja vašeg CR-a na Locator."
        buttons:
          dashboard: "Idite na svoju nadzornu ploču"
          setup: "Krenimo"
