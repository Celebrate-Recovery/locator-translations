es:
  locator:
    info:
      start:
        page_title: "Registra tu grupo - CR Locator"
        subtitle: "CR Locator"
        title: "Cómo registrar tu grupo CR en el Locator"
        intro: "¡Gracias por tu interés en agregar tu Ministerio Celebrate Recovery al CR Locator! Por favor, marca las casillas a continuación que indican que cumples con los requisitos para agregar tu grupo."
        ministries: "Los Ministerios Celebrate Recovery que se agregan al Locator pueden consistir en una Noche de Reunión General (Large Group y grupos Open Share) o solo grupos Open Share, con o sin Fellowship Dinner y/o Fellowship Cafe."
        question_1: "Nuestra Noche de Reunión General o grupos Open Share han estado en funcionamiento para el público durante un mínimo de 90 días."
        question_1_details: "Por favor, no marques esta casilla si aún no has estado en funcionamiento para el público durante al menos 90 días. Los 90 días en funcionamiento no incluyen los Step Studies previos al lanzamiento y la capacitación de líderes para preparar la apertura de tu CR al público. Los Representantes de CR no pueden aprobar grupos hasta que hayan cumplido este requisito."
        question_2: "Nuestra Iglesia y el Liderazgo CR acuerdan, implementan y siguen el ADN de Celebrate Recovery."
        question_2_details_html: "El Líder del Ministerio CR y el miembro del personal de la iglesia a quien el Líder del Ministerio reporta deberán firmar un formulario de acuerdo para que el CR sea aprobado para ser agregado al Locator. El ADN se puede encontrar en <a href=\"https://celebraterecovery.com\" target=\"_blank\" class=\"underline hover:text-gray-700\">celebraterecovery.com</a> &rsaquo; Resources &rsaquo; Our DNA."
        question_3: "Nuestros Líderes han completado la capacitación en línea sobre cómo iniciar un Celebrate Recovery y/o un Open Share Group Solo CR."
        question_3_details_html: "Esto no es obligatorio, pero es información útil para el Representante CR que aprobará tu solicitud para ser agregado al Locator. Los videos de capacitación se pueden encontrar en CR Official en Mighty Networks. Ve a <a href=\"https://celebraterecovery.com/cr-community/\" target=\"_blank\" class=\"underline hover:text-gray-700\">celebraterecovery.com/cr-community/</a> para más información."
        requirements: "Si tu CR NO cumple con los dos primeros requisitos anteriores, no continúes. Realiza primero los cambios necesarios en tu Celebrate Recovery. Por favor, contacta a un Representante Celebrate Recovery si tienes alguna pregunta."
        find_rep: "Regresa al CR Locator para buscar un Representante o grupo CR."
        requirements_met: "Si tu CR SÍ cumple con los requisitos anteriores, haz clic en el enlace a continuación para comenzar el proceso de agregar tu CR al Locator."
        buttons:
          dashboard: "Ve a tu dashboard"
          setup: "Empecemos"
