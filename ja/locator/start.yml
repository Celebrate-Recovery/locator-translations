ja:
  locator:
    info:
      start:
        page_title: "グループを登録する - CR Locator"
        subtitle: "CR Locator"
        title: "CR グループを Locator に登録する方法"
        intro: "Celebrate Recovery ミニストリーを CR Locator に追加することへのご関心をお寄せいただき、ありがとうございます！以下のチェックボックスにチェックを入れて、グループを追加するための要件を満たしていることをご確認ください。"
        ministries: "Locator に追加される Celebrate Recovery ミニストリーは、一般集会ナイト（Large Group と Open Share グループ）または Open Share グループのみで構成することができ、Fellowship Dinner および/または Fellowship Cafe の有無は問いません。"
        question_1: "私たちの一般集会ナイトまたは Open Share グループは、最低 90 日間、一般に公開されて運営されています。"
        question_1_details: "一般に公開されて少なくとも 90 日間運営されていない場合は、このチェックボックスにチェックを入れないでください。90 日間の運営には、一般へのオープン準備のための事前の Step Studies やリーダートレーニングは含まれません。CR 担当者は、この要件を満たすまでグループを承認することができません。"
        question_2: "私たちの教会と CR リーダーシップは、Celebrate Recovery の DNA に同意し、実施し、従っています。"
        question_2_details_html: "CR ミニストリーリーダーと、ミニストリーリーダーが報告する教会スタッフは、CR が Locator に追加されることを承認するために同意書に署名する必要があります。DNA は <a href=\"https://celebraterecovery.com\" target=\"_blank\" class=\"underline hover:text-gray-700\">celebraterecovery.com</a> &rsaquo; Resources &rsaquo; Our DNA でご確認いただけます。"
        question_3: "私たちのリーダーは、Celebrate Recovery および/または Open Share Group のみの CR の開始方法に関するオンライントレーニングを修了しています。"
        question_3_details_html: "これは必須ではありませんが、Locator への追加リクエストを承認する CR 担当者にとって役立つ情報です。トレーニング動画は Mighty Networks の CR Official でご覧いただけます。詳細については <a href=\"https://celebraterecovery.com/cr-community/\" target=\"_blank\" class=\"underline hover:text-gray-700\">celebraterecovery.com/cr-community/</a> をご覧ください。"
        requirements: "CR が上記の最初の 2 つの要件を満たしていない場合は、先に進まないでください。まず Celebrate Recovery に必要な変更を加えてください。ご質問がある場合は、Celebrate Recovery 担当者にお問い合わせください。"
        find_rep: "CR Locator に戻って、担当者または CR グループを検索してください。"
        requirements_met: "CR が上記の要件を満たしている場合は、以下のリンクをクリックして、CR を Locator に追加するプロセスを開始してください。"
        buttons:
          dashboard: "ダッシュボードに移動"
          setup: "始めましょう"
