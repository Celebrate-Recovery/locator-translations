ko:
  locator:
    info:
      start:
        page_title: "그룹 등록하기 - CR Locator"
        subtitle: "CR Locator"
        title: "CR 그룹을 Locator에 등록하는 방법"
        intro: "Celebrate Recovery 사역을 CR Locator에 추가하는 데 관심을 가져주셔서 감사합니다! 아래 체크박스에 표시하여 그룹 추가 요건을 충족하는지 확인해 주세요."
        ministries: "Locator에 추가되는 Celebrate Recovery 사역은 일반 모임의 밤(Large Group 및 Open Share 그룹) 또는 Open Share 그룹만으로 구성될 수 있으며, Fellowship Dinner 및/또는 Fellowship Cafe 포함 여부는 관계없습니다."
        question_1: "우리의 일반 모임의 밤 또는 Open Share 그룹은 최소 90일 동안 일반인에게 공개되어 운영되고 있습니다."
        question_1_details: "일반인에게 공개되어 최소 90일 동안 운영하지 않은 경우 이 체크박스를 선택하지 마십시오. 90일 운영 기간에는 CR을 일반인에게 개방하기 위한 사전 준비 Step Studies 및 리더 훈련이 포함되지 않습니다. CR 담당자는 이 요건을 충족할 때까지 그룹을 승인할 수 없습니다."
        question_2: "우리 교회와 CR 리더십은 Celebrate Recovery의 DNA에 동의하고 이를 실행하며 따릅니다."
        question_2_details_html: "CR 사역 리더와 사역 리더가 보고하는 교회 직원은 CR이 Locator에 추가될 수 있도록 승인을 받기 위해 동의서에 서명해야 합니다. DNA는 <a href=\"https://celebraterecovery.com\" target=\"_blank\" class=\"underline hover:text-gray-700\">celebraterecovery.com</a> &rsaquo; Resources &rsaquo; Our DNA에서 찾을 수 있습니다."
        question_3: "우리 리더들은 Celebrate Recovery 및/또는 Open Share Group 전용 CR을 시작하는 방법에 대한 온라인 교육을 완료했습니다."
        question_3_details_html: "이것은 필수는 아니지만 Locator 추가 요청을 승인할 CR 담당자에게 유용한 정보입니다. 교육 영상은 Mighty Networks의 CR Official에서 찾을 수 있습니다. 더 많은 정보를 위해 <a href=\"https://celebraterecovery.com/cr-community/\" target=\"_blank\" class=\"underline hover:text-gray-700\">celebraterecovery.com/cr-community/</a>를 방문하세요."
        requirements: "CR이 위의 첫 두 가지 요건을 충족하지 못하는 경우 진행하지 마십시오. 먼저 Celebrate Recovery에서 필요한 변경을 하십시오. 질문이 있으면 Celebrate Recovery 담당자에게 연락하십시오."
        find_rep: "CR Locator로 돌아가서 담당자 또는 CR 그룹을 검색하세요."
        requirements_met: "CR이 위의 요건을 충족하는 경우 아래 링크를 클릭하여 CR을 Locator에 추가하는 과정을 시작하세요."
        buttons:
          dashboard: "대시보드로 이동"
          setup: "시작해 봅시다"
