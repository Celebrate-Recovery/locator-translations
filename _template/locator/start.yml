en:
  locator:
    info:
      start:
        # Page metadata
        page_title: "Get your group listed - CR Locator" # Get your group listed - CR Locator

        # Page header
        subtitle: "CR Locator" # CR Locator
        title: "How to get your CR group listed on the Locator" # How to get your CR group listed on the Locator

        intro: "Thank you for your interest in adding your Celebrate Recovery Ministry to the CR Locator! Please check the boxes below indicating you meet the requirements to add your group." # Thank you for your interest in adding your Celebrate Recovery Ministry to the CR Locator! Please check the boxes below indicating you meet the requirements to add your group.
        ministries: "Celebrate Recovery Ministries that are added to the Locator may consist of either a General Meeting Night (Large Group and Open Share Groups) or just Open Share Groups, with or without Fellowship Dinner and/or Fellowing Cafe." # Celebrate Recovery Ministries that are added to the Locator may consist of either a General Meeting Night (Large Group and Open Share Groups) or just Open Share Groups, with or without Fellowship Dinner and/or Fellowing Cafe.

        # Questions
        question_1: "Our General Meeting Night or Open Share Groups have been up and running to the public for a minimum of 90 days." # Our General Meeting Night or Open Share Groups have been up and running to the public for a minimum of 90 days.
        question_1_details: "Please do not check this box if you have not already been up and running to the public for at least 90 days. The 90 days up and running does not include the pre-launch Step Studies and Leader training to prepare for opening your CR to the public. CR Reps cannot approve groups until they have met this requirement." # Please do not check this box if you have not already been up and running to the public for at least 90 days. The 90 days up and running does not include the pre-launch Step Studies and Leader training to prepare for opening your CR to the public. CR Reps cannot approve groups until they have met this requirement.
        question_2: "Our Church and CR Leadership agree to, implement and follow the DNA of Celebrate Recovery." # Our Church and CR Leadership agree to, implement and follow the DNA of Celebrate Recovery.
        question_2_details_html: "The CR Ministry Leader and the church staff person the Ministry Leader reports to will be required to sign an agreement form in order to get the CR approved to be added to the Locator. The DNA can be found at <a href=\"https://celebraterecovery.com\" target=\"_blank\" class=\"underline hover:text-gray-700\">celebraterecovery.com</a> &rsaquo; Resources &rsaquo; Our DNA."
        question_3: "Our Leaders have completed online training for how to start a Celebrate Recovery and/or Open Share Group Only CR. " # Our Leaders have completed online training for how to start a Celebrate Recovery and/or Open Share Group Only CR.
        question_3_details_html: "This is not required, but is helpful information for the CR Rep who will approve your request to be added to the Locator. The training videos can be found on CR Official on Mighty Networks. Go to <a href=\"https://celebraterecovery.com/cr-community/\" target=\"_blank\" class=\"underline hover:text-gray-700\">celebraterecovery.com/cr-community/</a> for more information."

        # Reqirements
        requirements: "If your CR DOES NOT meet the first two requirements above, do not proceed. Make the necessary changes at your Celebrate Recovery first. Please contact a Celebrate Recovery Representative if you have any questions. " # If your CR DOES NOT meet the first two requirements above, do not proceed. Make the necessary changes at your Celebrate Recovery first. Please contact a Celebrate Recovery Representative if you have any questions.
        find_rep: "Return to the CR Locator to search for a Rep or CR group." # Return to the CR Locator to search for a Rep or CR group.
        requirements_met: "If your CR DOES meet the requirements above, click on the link below to begin the process of adding your CR to the Locator." # If your CR DOES meet the requirements above, click on the link below to begin the process of adding your CR to the Locator.

        # Action buttons
        buttons:
          dashboard: "Go to your dashboard" # Go to your dashboard
          setup: "Let's get started" # Let's get started
