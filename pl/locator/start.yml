pl:
  locator:
    info:
      start:
        page_title: "Zarejestruj swoją grupę - CR Locator"
        subtitle: "CR Locator"
        title: "Jak zarejestrować swoją grupę CR w Locatorze"
        intro: "Dziękujemy za zainteresowanie dodaniem swojego Ministerium Celebrate Recovery do CR Locatora! Zaznacz poniższe pola, które wskazują, że spełniasz wymagania dotyczące dodania swojej grupy."
        ministries: "Ministerstwa Celebrate Recovery dodawane do Locatora mogą składać się z Wieczoru Ogólnego Spotkania (Large Group i grupy Open Share) lub tylko grup Open Share, z lub bez Fellowship Dinner i/lub Fellowship Cafe."
        question_1: "Nasz Wieczór Ogólnego Spotkania lub grupy Open Share działają dla publiczności przez co najmniej 90 dni."
        question_1_details: "Proszę nie zaznaczać tego pola, jeśli nie działacie publicznie przez co najmniej 90 dni. 90 dni działalności nie obejmuje przedstartowych Step Studies i szkolenia liderów przygotowującego do otwarcia CR dla publiczności. Przedstawiciele CR nie mogą zatwierdzać grup, dopóki nie spełnią tego wymagania."
        question_2: "Nasz Kościół i Przywództwo CR zgadzają się, wdrażają i przestrzegają DNA Celebrate Recovery."
        question_2_details_html: "Lider Ministerium CR oraz pracownik kościoła, któremu Lider Ministerium podlega, będą musieli podpisać formularz umowy, aby CR zostało zatwierdzone do dodania do Locatora. DNA można znaleźć na stronie <a href=\"https://celebraterecovery.com\" target=\"_blank\" class=\"underline hover:text-gray-700\">celebraterecovery.com</a> &rsaquo; Resources &rsaquo; Our DNA."
        question_3: "Nasi Liderzy ukończyli szkolenie online dotyczące uruchomienia Celebrate Recovery i/lub Open Share Group Tylko CR."
        question_3_details_html: "Nie jest to wymagane, ale stanowi przydatną informację dla Przedstawiciela CR, który zatwierdzi Twoje zgłoszenie do Locatora. Filmy szkoleniowe można znaleźć na CR Official w Mighty Networks. Przejdź na stronę <a href=\"https://celebraterecovery.com/cr-community/\" target=\"_blank\" class=\"underline hover:text-gray-700\">celebraterecovery.com/cr-community/</a>, aby uzyskać więcej informacji."
        requirements: "Jeśli Twoje CR NIE spełnia pierwszych dwóch wymagań powyżej, nie kontynuuj. Najpierw wprowadź niezbędne zmiany w swoim Celebrate Recovery. Skontaktuj się z Przedstawicielem Celebrate Recovery, jeśli masz jakieś pytania."
        find_rep: "Wróć do CR Locatora, aby wyszukać Przedstawiciela lub grupę CR."
        requirements_met: "Jeśli Twoje CR SPEŁNIA powyższe wymagania, kliknij poniższy link, aby rozpocząć proces dodawania swojego CR do Locatora."
        buttons:
          dashboard: "Przejdź do swojego panelu"
          setup: "Zacznijmy"
