af:
  locator:
    info:
      start:
        page_title: "Laat jou groep gelys word - CR Locator"
        subtitle: "CR Locator"
        title: "Hoe om jou CR-groep op die Locator gelys te kry"
        intro: "Dankie vir jou belangstelling om jou Celebrate Recovery Bediening by die CR Locator te voeg! Merk asseblief die blokkies hieronder wat aandui dat jy aan die vereistes voldoen om jou groep by te voeg."
        ministries: "Celebrate Recovery Bedieninge wat by die Locator gevoeg word, kan bestaan uit 'n Algemene Vergaderingsaand (Large Group en Open Share Groepe) of net Open Share Groepe, met of sonder Fellowship Dinner en/of Fellowship Cafe."
        question_1: "Ons Algemene Vergaderingsaand of Open Share Groepe is reeds vir 'n minimum van 90 dae vir die publiek in werking."
        question_1_details: "Merk asseblief nie hierdie blokkie as jy nog nie vir ten minste 90 dae vir die publiek in werking is nie. Die 90 dae in werking sluit nie die voor-bekendstelling Step Studies en leierskapsopleiding in om jou CR vir die publiek voor te berei nie. CR Verteenwoordigers kan nie groepe goedkeur voordat hulle aan hierdie vereiste voldoen het nie."
        question_2: "Ons Kerk en CR Leierskap stem in, implementeer en volg die DNA van Celebrate Recovery."
        question_2_details_html: "Die CR Bediening Leier en die kerklid aan wie die Bediening Leier rapporteer, sal 'n ooreenkoms moet onderteken om die CR goedgekeur te kry om by die Locator gevoeg te word. Die DNA kan gevind word by <a href=\"https://celebraterecovery.com\" target=\"_blank\" class=\"underline hover:text-gray-700\">celebraterecovery.com</a> &rsaquo; Resources &rsaquo; Our DNA."
        question_3: "Ons Leiers het aanlyn opleiding voltooi oor hoe om 'n Celebrate Recovery en/of Open Share Group Slegs CR te begin."
        question_3_details_html: "Dit is nie verpligtend nie, maar is nuttige inligting vir die CR Verteenwoordiger wat jou versoek sal goedkeur om by die Locator gevoeg te word. Die opleidingsvideo's kan gevind word op CR Official op Mighty Networks. Gaan na <a href=\"https://celebraterecovery.com/cr-community/\" target=\"_blank\" class=\"underline hover:text-gray-700\">celebraterecovery.com/cr-community/</a> vir meer inligting."
        requirements: "As jou CR NIE aan die eerste twee vereistes hierbo voldoen NIE, moenie voortgaan nie. Maak eers die nodige veranderinge by jou Celebrate Recovery. Kontak asseblief 'n Celebrate Recovery Verteenwoordiger as jy enige vrae het."
        find_rep: "Keer terug na die CR Locator om 'n Verteenwoordiger of CR-groep te soek."
        requirements_met: "As jou CR WEL aan die vereistes hierbo voldoen, klik op die skakel hieronder om die proses te begin om jou CR by die Locator te voeg."
        buttons:
          dashboard: "Gaan na jou dashboard"
          setup: "Kom ons begin"
