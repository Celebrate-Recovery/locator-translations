ru:
  locator:
    info:
      start:
        page_title: "Зарегистрируйте свою группу - CR Locator"
        subtitle: "CR Locator"
        title: "Как зарегистрировать группу CR в Locator"
        intro: "Спасибо за интерес к добавлению вашего служения Celebrate Recovery в CR Locator! Пожалуйста, отметьте галочками поля ниже, подтверждая, что вы соответствуете требованиям для добавления вашей группы."
        ministries: "Служения Celebrate Recovery, добавляемые в Locator, могут состоять из Общего Вечера Встречи (Large Group и группы Open Share) или только групп Open Share, с или без Fellowship Dinner и/или Fellowship Cafe."
        question_1: "Наш Общий Вечер Встречи или группы Open Share работают для широкой публики не менее 90 дней."
        question_1_details: "Пожалуйста, не отмечайте это поле, если вы ещё не работаете для широкой публики не менее 90 дней. 90 дней работы не включают предзапуск Step Studies и обучение лидеров для подготовки CR к открытию для публики. Представители CR не могут одобрить группы, пока они не выполнят это требование."
        question_2: "Наша Церковь и руководство CR соглашаются, внедряют и следуют ДНК Celebrate Recovery."
        question_2_details_html: "Руководитель служения CR и сотрудник церкви, которому Руководитель служения подотчётен, должны будут подписать форму соглашения, чтобы CR было одобрено для добавления в Locator. ДНК можно найти на сайте <a href=\"https://celebraterecovery.com\" target=\"_blank\" class=\"underline hover:text-gray-700\">celebraterecovery.com</a> &rsaquo; Resources &rsaquo; Our DNA."
        question_3: "Наши Лидеры прошли онлайн-обучение о том, как запустить Celebrate Recovery и/или Open Share Group только CR."
        question_3_details_html: "Это не обязательно, но является полезной информацией для Представителя CR, который одобрит ваш запрос на добавление в Locator. Обучающие видео можно найти на CR Official в Mighty Networks. Посетите <a href=\"https://celebraterecovery.com/cr-community/\" target=\"_blank\" class=\"underline hover:text-gray-700\">celebraterecovery.com/cr-community/</a> для получения дополнительной информации."
        requirements: "Если ваш CR НЕ соответствует первым двум требованиям выше, не продолжайте. Сначала внесите необходимые изменения в ваше Celebrate Recovery. Пожалуйста, свяжитесь с Представителем Celebrate Recovery, если у вас есть вопросы."
        find_rep: "Вернитесь в CR Locator для поиска Представителя или группы CR."
        requirements_met: "Если ваш CR СООТВЕТСТВУЕТ вышеуказанным требованиям, нажмите на ссылку ниже, чтобы начать процесс добавления вашего CR в Locator."
        buttons:
          dashboard: "Перейти на панель управления"
          setup: "Давайте начнём"
