ar:
  locator:
    info:
      start:
        page_title: "أضف مجموعتك إلى القائمة - CR Locator"
        subtitle: "CR Locator"
        title: "كيفية إدراج مجموعة CR الخاصة بك في Locator"
        intro: "شكرًا لاهتمامك بإضافة خدمة Celebrate Recovery الخاصة بك إلى CR Locator! يُرجى تحديد المربعات أدناه للإشارة إلى أنك تستوفي المتطلبات لإضافة مجموعتك."
        ministries: "يمكن أن تتكون خدمات Celebrate Recovery المضافة إلى Locator من ليلة اجتماع عام (Large Group ومجموعات Open Share) أو مجموعات Open Share فقط، مع أو بدون Fellowship Dinner و/أو Fellowship Cafe."
        question_1: "ليلة الاجتماع العام أو مجموعات Open Share لدينا تعمل للعموم منذ 90 يومًا على الأقل."
        question_1_details: "يُرجى عدم تحديد هذا المربع إذا لم تكن قد بدأت العمل للعموم منذ 90 يومًا على الأقل. لا تشمل فترة 90 يومًا Step Studies وتدريب القادة التحضيرية قبل افتتاح CR للعموم. لا يمكن لممثلي CR الموافقة على المجموعات حتى تستوفي هذا الشرط."
        question_2: "تتفق كنيستنا وقيادة CR وتنفذ وتتبع الحمض النووي لـ Celebrate Recovery."
        question_2_details_html: "سيُطلب من قائد خدمة CR والشخص من طاقم الكنيسة الذي يرفع إليه قائد الخدمة التقارير التوقيع على نموذج اتفاقية للحصول على موافقة CR لإضافتها إلى Locator. يمكن العثور على DNA في <a href=\"https://celebraterecovery.com\" target=\"_blank\" class=\"underline hover:text-gray-700\">celebraterecovery.com</a> &rsaquo; Resources &rsaquo; Our DNA."
        question_3: "أكمل قادتنا التدريب عبر الإنترنت حول كيفية بدء Celebrate Recovery و/أو Open Share Group فقط CR."
        question_3_details_html: "هذا ليس إلزاميًا، لكنه معلومة مفيدة لممثل CR الذي سيوافق على طلبك للإضافة إلى Locator. يمكن العثور على مقاطع الفيديو التدريبية على CR Official في Mighty Networks. انتقل إلى <a href=\"https://celebraterecovery.com/cr-community/\" target=\"_blank\" class=\"underline hover:text-gray-700\">celebraterecovery.com/cr-community/</a> لمزيد من المعلومات."
        requirements: "إذا كانت CR الخاصة بك لا تستوفي أول متطلبين أعلاه، فلا تكمل. أجرِ التغييرات اللازمة في Celebrate Recovery أولًا. يُرجى التواصل مع ممثل Celebrate Recovery إذا كان لديك أي أسئلة."
        find_rep: "العودة إلى CR Locator للبحث عن ممثل أو مجموعة CR."
        requirements_met: "إذا كانت CR الخاصة بك تستوفي المتطلبات أعلاه، انقر على الرابط أدناه لبدء عملية إضافة CR الخاصة بك إلى Locator."
        buttons:
          dashboard: "انتقل إلى لوحة التحكم الخاصة بك"
          setup: "لنبدأ"
